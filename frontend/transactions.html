<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions | Smart Finance Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="dashboard-page">
    <aside class="sidebar">
        <div class="sidebar-header"><a href="index.html" class="logo">
                <div class="logo-icon">💰</div><span>SmartFinance</span>
            </a></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
            <a href="transactions.html" class="nav-item active"><i
                    class="fas fa-exchange-alt"></i><span>Transactions</span></a>
            <a href="investments.html" class="nav-item"><i class="fas fa-chart-pie"></i><span>Investments</span></a>
            <a href="insights.html" class="nav-item"><i class="fas fa-lightbulb"></i><span>AI Insights</span></a>
            <a href="goals.html" class="nav-item"><i class="fas fa-bullseye"></i><span>Goals</span></a>
            <div class="nav-divider"></div>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
            <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i><span>Settings</span></a>
        </nav>
        <div class="sidebar-footer"><button onclick="logout()" class="nav-item logout"><i
                    class="fas fa-sign-out-alt"></i><span>Logout</span></button></div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle"><i class="fas fa-bars"></i></button>
            </div>
            <div class="topbar-right">
                <div class="user-menu-wrapper">
                    <div class="user-menu" id="userMenuBtn">
                        <div class="user-avatar" id="userAvatar">JD</div>
                        <span class="user-name" id="userName">User</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="dropdown-user-info">
                            <div class="dropdown-avatar" id="dropdownAvatar">JD</div>
                            <div class="dropdown-user-details">
                                <span class="dropdown-user-name" id="dropdownUserName">User</span>
                                <span class="dropdown-user-email" id="dropdownUserEmail">user@email.com</span>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="profile.html" class="dropdown-item"><i class="fas fa-user"></i>My Profile</a>
                        <button class="dropdown-item logout-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Logout</button>
                    </div>
                </div>
            </div>
        </header>
        <div class="dashboard-content">
            <div class="page-header">
                <div>
                    <h1>All Transactions</h1>
                    <p>View and manage your income and expenses</p>
                </div>
                <button class="btn btn-primary" onclick="openModal('transactionModal')"><i class="fas fa-plus"></i> Add
                    Transaction</button>
            </div>
            <!-- Filters -->
            <div class="filters-bar">
                <div class="filter-group">
                    <select id="filterType">
                        <option value="all">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                    <select id="filterCategory">
                        <option value="all">All Categories</option>
                        <option value="food">Food</option>
                        <option value="shopping">Shopping</option>
                        <option value="transport">Transport</option>
                        <option value="bills">Bills</option>
                        <option value="salary">Salary</option>
                        <option value="entertainment">Entertainment</option>
                    </select>
                    <input type="month" id="filterMonth">
                </div>
                <div class="filter-group">
                    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput"
                            placeholder="Search transactions..."></div>
                </div>
            </div>
            <!-- Transactions Table -->
            <div class="card">
                <table class="transactions-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactionsList"></tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- Modal (same as dashboard) -->
    <div class="modal" id="transactionModal">
        <div class="modal-overlay" onclick="closeModal('transactionModal')"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add Transaction</h3><button class="modal-close" onclick="closeModal('transactionModal')"><i
                        class="fas fa-times"></i></button>
            </div>
            <form id="transactionForm" class="modal-body">
                <div class="form-row">
                    <div class="form-group"><label>Type</label>
                        <div class="toggle-group"><button type="button" class="toggle-btn active"
                                data-value="expense">Expense</button><button type="button" class="toggle-btn"
                                data-value="income">Income</button></div><input type="hidden" id="transactionType"
                            value="expense">
                    </div>
                </div>
                <div class="form-group"><label for="amount">Amount (₹)</label><input type="number" id="amount"
                        placeholder="Enter amount" required></div>
                <div class="form-group" id="categoryGroup"><label for="category" id="categoryLabel">Category</label><select id="category" required>
                        <option value="">Select category</option>
                        <option value="food">Food & Dining</option>
                        <option value="shopping">Shopping</option>
                        <option value="transport">Transport</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="bills">Bills & Utilities</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select></div>
                <div class="form-group"><label for="description" id="descriptionLabel">Description</label><input type="text" id="description"
                        placeholder="What did you spend on?"></div>
                <div class="form-group"><label for="date">Date</label><input type="date" id="date" required></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Add Transaction</button>
            </form>
        </div>
    </div>
    <script src="js/main.js"></script>
    <script src="js/transactions.js"></script>
</body>

</html>
